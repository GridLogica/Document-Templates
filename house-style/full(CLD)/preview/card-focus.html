<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Focus block</title></head>

      <h3 style="font-family: var(--font-sans); font-size: 22px; font-weight: 700; letter-spacing: -0.015em; color: var(--gl-ink); margin: 0 0 16px;">Cognitive Load</h3>

    <div>
      <h3 style="font-family: var(--font-sans); font-size: 22px; font-weight: 700; letter-spacing: -0.015em; color: var(--gl-ink); margin: 0 0 16px;">Embodied Pedagogy</h3>
      <p style="font-family: var(--font-serif); font-size: 16px; font-weight: 400; line-height: 1.65; color: var(--gl-ink-2); margin: 0;">Mapping physical movement to conceptual understanding via DET standards.</p>
    </div>
  </div>
