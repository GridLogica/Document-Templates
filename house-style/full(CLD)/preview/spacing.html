<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Spacing scale</title></head>
<body>
<div class="card">
  <div class="row gap-2" style="align-items: flex-end;">
    <div style="background: var(--gl-accent-light); border-radius: 2px; width: 4px; height: 4px;"></div>
    <div style="background: var(--gl-accent-light); border-radius: 2px; width: 8px; height: 8px;"></div>
    <div style="background: var(--gl-accent-light); border-radius: 2px; width: 12px; height: 12px;"></div>
    <div style="background: var(--gl-accent-light); border-radius: 2px; width: 16px; height: 16px;"></div>
    <div style="background: var(--gl-accent-light); border-radius: 2px; width: 24px; height: 24px;"></div>
    <div style="background: var(--gl-accent-light); border-radius: 2px; width: 32px; height: 32px;"></div>
    <div style="background: var(--gl-accent-light); border-radius: 2px; width: 48px; height: 48px;"></div>
    <div style="background: var(--gl-accent-light); border-radius: 2px; width: 64px; height: 64px;"></div>
  </div>
  <div class="row gap-2" style="margin-top: 6px;">
    <div class="mono" style="width: 4px; text-align: center;">4</div>
    <div class="mono" style="width: 8px; text-align: center;">8</div>
    <div class="mono" style="width: 12px; text-align: center;">12</div>
    <div class="mono" style="width: 16px; text-align: center;">16</div>
    <div class="mono" style="width: 24px; text-align: center;">24</div>
    <div class="mono" style="width: 32px; text-align: center;">32</div>
    <div class="mono" style="width: 48px; text-align: center;">48</div>
    <div class="mono" style="width: 64px; text-align: center;">64</div>
  </div>
  <div class="mono" style="color: var(--gl-ink-3); margin-top: 16px; letter-spacing: 0.05em; text-transform: none; font-size: 11px;">4px base — 4 · 8 · 12 · 16 · 24 · 32 · 48 · 64 · 96.</div>
</div>
</body></html>
