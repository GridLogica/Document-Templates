<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Surface + amber</title></head>
<body>
<div class="card">
  <div class="row gap-3" style="align-items: stretch;">
    <div style="flex: 1;">
      <div style="height: 88px; background: #ffffff; border: 0.5px solid var(--gl-rule); border-radius: 4px;"></div>
      <div class="mono" style="margin-top: 8px;">Surface</div>
      <div class="mono" style="color: var(--gl-ink-2); letter-spacing: 0.05em;">#ffffff</div>
    </div>
    <div style="flex: 1;">
      <div style="height: 88px; background: #f5f3ed; border: 0.5px solid var(--gl-rule); border-radius: 4px;"></div>
      <div class="mono" style="margin-top: 8px;">Warm</div>
      <div class="mono" style="color: var(--gl-ink-2); letter-spacing: 0.05em;">#f5f3ed</div>
    </div>
    <div style="flex: 1;">
      <div style="height: 88px; background: #b87333; border-radius: 4px;"></div>
      <div class="mono" style="margin-top: 8px;">Amber</div>
      <div class="mono" style="color: var(--gl-ink-2); letter-spacing: 0.05em;">#b87333</div>
    </div>
    <div style="flex: 1;">
      <div style="height: 88px; background: #f0e4d0; border-radius: 4px;"></div>
      <div class="mono" style="margin-top: 8px;">Amber Light</div>
      <div class="mono" style="color: var(--gl-ink-2); letter-spacing: 0.05em;">#f0e4d0</div>
    </div>
  </div>
  <div class="mono" style="color: var(--gl-ink-3); margin-top: 14px; letter-spacing: 0.05em; text-transform: none; font-size: 11px;">Warm replaces #fff for pages. Amber is for PDF indicators and secondary tags only.</div>
</div>
</body></html>
