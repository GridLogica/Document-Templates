<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Grid motif</title></head>
<body>
<div class="card">
  <div class="mono" style="border-top: 1px solid var(--gl-rule); padding-top: 10px; margin-bottom: 14px;">Design Motif — the grid</div>
  <div style="
    height: 96px;
    background-image:
      linear-gradient(var(--gl-rule) 1px, transparent 1px),
      linear-gradient(90deg, var(--gl-rule) 1px, transparent 1px);
    background-size: 24px 24px;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  ">
    <div class="mono" style="position: absolute; bottom: 10px; right: 14px; letter-spacing: 0.1em;">order from complexity</div>
  </div>
  <p style="font-family: var(--font-sans); font-size: 12px; color: var(--gl-ink-3); margin-top: 12px; line-height: 1.5; max-width: 560px;">
    Hairline grid (24×24px). Background texture for hero / about regions. Used at most once per view.
  </p>
</div>
</body></html>
