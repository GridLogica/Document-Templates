<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Iconography</title></head>
<body>
<div class="card">
  <div class="row gap-5 aic wrap">
    <div class="col gap-2 aic">
      <div style="font-family: var(--font-mono); font-size: 24px; color: var(--gl-accent-mid); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">↓</div>
      <div class="mono">download</div>
    </div>
    <div class="col gap-2 aic">
      <div style="font-family: var(--font-mono); font-size: 24px; color: var(--gl-accent-mid); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">→</div>
      <div class="mono">forward</div>
    </div>
    <div class="col gap-2 aic">
      <div style="font-family: var(--font-mono); font-size: 24px; color: var(--gl-accent-mid); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">·</div>
      <div class="mono">middot</div>
    </div>
    <div class="col gap-2 aic">
      <div style="font-family: var(--font-mono); font-size: 24px; color: var(--gl-accent-mid); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">—</div>
      <div class="mono">em-dash</div>
    </div>
  </div>
  <div class="mono" style="color: var(--gl-ink-3); margin-top: 16px; letter-spacing: 0.05em; text-transform: none; font-size: 11px;">No icon font. Unicode glyphs in DM Mono. Lucide outline as fallback (flag substitution).</div>
</div>
</body></html>
