<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Display type</title></head>
<body>
<div class="card">
  <div class="col gap-4">
    <div class="row gap-4 aib">
      <div class="mono" style="min-width: 140px; flex-shrink: 0;">Inter 700 / 80px H1</div>
      <div style="font-family: var(--font-sans); font-size: 80px; font-weight: 700; line-height: 1.05; letter-spacing: -0.025em;">Pedagogical Inquiry</div>
    </div>
    <div class="row gap-4 aib">
      <div class="mono" style="min-width: 140px; flex-shrink: 0;">Inter 700 / 30px H2</div>
      <div style="font-family: var(--font-sans); font-size: 30px; font-weight: 700; letter-spacing: -0.02em;">Recent Publications</div>
    </div>
    <div class="row gap-4 aib">
      <div class="mono" style="min-width: 140px; flex-shrink: 0;">Inter 700 / 22px H3</div>
      <div style="font-family: var(--font-sans); font-size: 22px; font-weight: 700; letter-spacing: -0.015em;">Cognitive Load</div>
    </div>
    <div class="row gap-4 aib">
      <div class="mono" style="min-width: 140px; flex-shrink: 0;">Inter 700 / 28px<br/><span style="opacity: 0.6;">publication title</span></div>
      <div style="font-family: var(--font-sans); font-size: 28px; font-weight: 700; letter-spacing: -0.02em; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 4px;">Purpose</div>
    </div>
  </div>
  <div class="mono" style="color: var(--gl-ink-3); margin-top: 18px; letter-spacing: 0.05em; text-transform: none; font-size: 11px;">All headings are sans (Inter 700) with negative tracking. Publication titles carry a thin underline.</div>
</div>
</body></html>
