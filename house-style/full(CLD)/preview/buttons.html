<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Buttons</title></head>
<body>
<div class="card">
  <div class="col gap-4 ais">
    <div style="display: inline-flex;">
      <button style="background: var(--gl-ink); color: #fff; border: none; padding: 10px 20px; font-family: var(--font-sans); font-size: 15px; font-weight: 500; border-top-left-radius: 6px; border-bottom-left-radius: 6px; cursor: pointer; white-space: nowrap;">Access Framework</button>
      <button style="background: var(--gl-ink); color: #fff; border: none; border-left: 1px solid #404040; padding: 10px 12px; border-top-right-radius: 6px; border-bottom-right-radius: 6px; cursor: pointer; display: inline-flex; align-items: center;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>
    <button style="background: var(--gl-ink); color: #fff; border: none; padding: 10px 20px; font-family: var(--font-sans); font-size: 15px; font-weight: 500; border-radius: 6px; cursor: pointer;">Primary Solo</button>
    <a style="font-family: var(--font-sans); font-size: 15px; font-weight: 500; color: var(--gl-ink); cursor: pointer;">Inquiry</a>
    <span style="display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--gl-accent);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      PDF Available
    </span>
  </div>
</div>
</body></html>
