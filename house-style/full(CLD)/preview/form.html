<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Form input</title></head>
<body>
<div class="card">
  <div style="max-width: 380px;">
    <label style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gl-ink-3); display: block; margin-bottom: 8px;">Search publications</label>
    <input style="width: 100%; border: 0.5px solid var(--gl-rule); border-radius: 2px; padding: 11px 14px; font-family: var(--font-sans); font-size: 14px; font-weight: 300; color: var(--gl-ink); background: #fff; outline: none;" type="text" placeholder="Keyword or standard code…" />
  </div>
  <div class="mono" style="color: var(--gl-ink-3); margin-top: 16px; letter-spacing: 0.05em; text-transform: none; font-size: 11px;">Hairline border, 2px radius. Mono uppercase label, sans-serif input.</div>
</div>
</body></html>
