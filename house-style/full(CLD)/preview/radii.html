<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Radii & rules</title></head>
<body>
<div class="card">
  <div class="row gap-3 aic wrap">
    <div style="width: 56px; height: 56px; background: var(--gl-accent-light); border: 0.5px solid var(--gl-accent); border-radius: 0; display: flex; align-items: center; justify-content: center;">
      <span class="mono">0</span>
    </div>
    <div style="width: 56px; height: 56px; background: var(--gl-accent-light); border: 0.5px solid var(--gl-accent); border-radius: 2px; display: flex; align-items: center; justify-content: center;">
      <span class="mono">2</span>
    </div>
    <div style="width: 56px; height: 56px; background: var(--gl-accent-light); border: 0.5px solid var(--gl-accent); border-radius: 4px; display: flex; align-items: center; justify-content: center;">
      <span class="mono">4</span>
    </div>
    <div style="width: 56px; height: 56px; background: var(--gl-accent-light); border: 0.5px solid var(--gl-accent); border-radius: 6px; display: flex; align-items: center; justify-content: center;">
      <span class="mono">6</span>
    </div>
  </div>
  <div class="col gap-3" style="margin-top: 22px;">
    <div style="height: 1px; background: var(--gl-rule); position: relative;">
      <span class="mono" style="position: absolute; top: 6px; left: 0;">0.5px hairline · gl-rule</span>
    </div>
    <div style="height: 1px; background: var(--gl-ink-3); position: relative; margin-top: 18px;">
      <span class="mono" style="position: absolute; top: 6px; left: 0;">1px strong · gl-ink-3</span>
    </div>
    <div style="height: 3px; background: var(--gl-accent); position: relative; margin-top: 18px;">
      <span class="mono" style="position: absolute; top: 8px; left: 0;">3px accent · publication card edge</span>
    </div>
  </div>
</div>
</body></html>
